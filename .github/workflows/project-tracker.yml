name: Basic Project Tracker

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to analyze (for example, main)
        required: true
        default: main
      allowed_branches:
        description: Comma-separated allowed branches (for example, main,develop,release/*)
        required: false
        default: main
  schedule:
    - cron: '0 2 * * 5'

permissions:
  contents: read

concurrency:
  group: basic-project-tracker-${{ github.ref_name || inputs.target_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve branch configuration
        id: branch_cfg
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET_BRANCH="${{ inputs.target_branch }}"
            ALLOWED_RAW="${{ inputs.allowed_branches }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
            ALLOWED_RAW="${{ vars.PROJECT_TRACKER_ALLOWED_BRANCHES }}"
          fi

          if [ -z "${ALLOWED_RAW}" ]; then
            ALLOWED_RAW="main"
          fi

          SHOULD_RUN="false"
          IFS=',' read -ra BRANCH_PATTERNS <<< "$ALLOWED_RAW"
          for pattern in "${BRANCH_PATTERNS[@]}"; do
            trimmed="$(echo "$pattern" | xargs)"
            if [ -n "$trimmed" ] && [[ "$TARGET_BRANCH" == $trimmed ]]; then
              SHOULD_RUN="true"
              break
            fi
          done

          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "allowed_branches=$ALLOWED_RAW" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Skip when branch is not allowed
        if: ${{ steps.branch_cfg.outputs.should_run != 'true' }}
        shell: bash
        run: |
          echo "Skipping project tracker."
          echo "Current branch: ${{ steps.branch_cfg.outputs.target_branch }}"
          echo "Allowed branches: ${{ steps.branch_cfg.outputs.allowed_branches }}"
          echo "To configure non-manual runs, set repository variable PROJECT_TRACKER_ALLOWED_BRANCHES."
          echo "### Basic Project Tracker" >> "$GITHUB_STEP_SUMMARY"
          echo "Run skipped because branch is not allowed." >> "$GITHUB_STEP_SUMMARY"
          echo "Current branch: ${{ steps.branch_cfg.outputs.target_branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Allowed branches: ${{ steps.branch_cfg.outputs.allowed_branches }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout selected branch
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.branch_cfg.outputs.target_branch }}

      - name: Load prompt
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        id: prompt
        shell: bash
        run: |
          set -euo pipefail
          PROMPT_FILE=".github/prompts/basic-project-tracker.prompt.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "Prompt file not found at $PROMPT_FILE — skipping prompt load."
            echo "PROMPT=" >> "$GITHUB_ENV"
          else
            {
              echo "PROMPT<<EOF"
              cat "$PROMPT_FILE"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "Prompt loaded successfully from $PROMPT_FILE"
          fi

      - name: Analyze codebase
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        id: analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${{ steps.branch_cfg.outputs.target_branch }}"
          NOW_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          PROJECT_FILE="project.json"

          FILE_COUNT="$(git ls-files | wc -l | tr -d ' ')"
          COMMIT_LAST_30="$(git rev-list --count --since='30 days ago' HEAD)"

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

          PROJECT_NAME="Unknown Project"
          PROJECT_SUMMARY="No project summary available."
          PROJECT_OWNER="Unknown"
          PRIMARY_PHASE="Development"
          PHASE_CONFIDENCE="70"
          SECONDARY_PHASE="None"
          COMPLETED_ITEMS="- None"
          IN_PROGRESS_ITEMS="- None"
          PENDING_ITEMS="- None"
          RISK_ITEMS="- None"
          NEXT_ACTIONS=$'1. Define project milestones in project.json.\n2. Add risks and blockers in project.json.\n3. Re-run workflow to generate full project tracker report.'
          EVIDENCE_ITEMS="- File: ${PROJECT_FILE} | Why: Not found, so report used fallback values."$'\n'"- File: .github/workflows/project-tracker.yml | Why: Contains tracker generation logic."

          if [ -f "$PROJECT_FILE" ]; then
            PROJECT_NAME="$(jq -r '.project.name // "Unknown Project"' "$PROJECT_FILE")"
            PROJECT_SUMMARY="$(jq -r '.project.summary // "No project summary available."' "$PROJECT_FILE")"
            PROJECT_OWNER="$(jq -r '.project.owner // "Unknown"' "$PROJECT_FILE")"
            PRIMARY_PHASE="$(jq -r '.currentPhase.name // "Development"' "$PROJECT_FILE")"
            PHASE_CONFIDENCE="$(jq -r '.currentPhase.confidence // 70' "$PROJECT_FILE")"
            SECONDARY_PHASE="$(jq -r '.currentPhase.secondaryPhase // "None"' "$PROJECT_FILE")"

            COMPLETED_ITEMS="$(jq -r '[(.milestones // [])[] | select(.status=="done") | "- " + .name] | if length > 0 then join("\n") else "- None" end' "$PROJECT_FILE")"
            IN_PROGRESS_ITEMS="$(jq -r '[(.milestones // [])[] | select(.status=="in-progress") | "- " + .name] | if length > 0 then join("\n") else "- None" end' "$PROJECT_FILE")"
            PENDING_ITEMS="$(jq -r '[(.milestones // [])[] | select(.status=="pending") | "- " + .name] | if length > 0 then join("\n") else "- None" end' "$PROJECT_FILE")"
            RISK_ITEMS="$(jq -r '[(.risks // [])[] | "- [" + (.severity // "unknown") + "] " + (.title // "Unspecified risk") + " (" + (.status // "unknown") + ")"] | if length > 0 then join("\n") else "- None" end' "$PROJECT_FILE")"
            NEXT_ACTIONS="$(jq -r '(.nextActions // []) as $a | if ($a|length)>0 then [range(0; ($a|length)) | ((.+1|tostring) + ". " + $a[.])] | join("\n") else "1. Review project status and add nextActions in project.json.\n2. Assign owners to open work items.\n3. Re-run tracker after updates." end' "$PROJECT_FILE")"
            EVIDENCE_ITEMS="$(jq -r --arg pf "$PROJECT_FILE" '[
              "- File: " + $pf + " | Why: Primary source for summary, phase, milestones, risks, and actions.",
              "- File: .github/prompts/basic-project-tracker.prompt.md | Why: Defines output structure for the report.",
              "- File: .github/workflows/project-tracker.yml | Why: Controls trigger, branch scope, and report generation."
            ] | join("\n")')"
          fi

          AI_REPORT=""
          if [ -n "${OPENAI_API_KEY:-}" ] && [ -n "${PROMPT:-}" ] && [ -f "$PROJECT_FILE" ]; then
            PROJECT_JSON="$(cat "$PROJECT_FILE")"
            AI_INPUT="Prompt:\n${PROMPT}\n\nProject Data:\n${PROJECT_JSON}\n\nRepository Context:\n- Repository: ${GITHUB_REPOSITORY}\n- Branch: ${BRANCH}\n- Recent commits (30d): ${COMMIT_LAST_30}\n- Tracked files: ${FILE_COUNT}\n"

            RESPONSE="$(curl --max-time 45 -sS https://api.openai.com/v1/responses \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              -d "$(jq -n --arg input "$AI_INPUT" '{model:"gpt-4.1-mini", input:$input}')" || true)"

            AI_REPORT="$(echo "$RESPONSE" | jq -r '.output_text // .output[0].content[0].text // empty' 2>/dev/null || true)"
          fi

          mkdir -p tracker

          cat > tracker/project-tracker-report.md <<EOF
          # Basic Project Tracker Report

          - Generated: ${NOW_UTC}
          - Repository: ${GITHUB_REPOSITORY}
          - Branch: ${BRANCH}
          - Trigger: ${{ github.event_name }}
          - Data source: ${PROJECT_FILE}

          EOF

          if [ -n "$AI_REPORT" ]; then
            cat >> tracker/project-tracker-report.md <<EOF
          ${AI_REPORT}

          EOF
          else
            cat >> tracker/project-tracker-report.md <<EOF
          Project Summary
          - ${PROJECT_NAME} is the current project.
          - ${PROJECT_SUMMARY}
          - Project owner: ${PROJECT_OWNER}
          - This report is generated from structured project data instead of raw git statistics.
          - Recent engineering activity indicates ${COMMIT_LAST_30} commits in the last 30 days.

          Current Phase
          - Primary phase: ${PRIMARY_PHASE}
          - Confidence: ${PHASE_CONFIDENCE}%
          - Secondary phase (if needed): ${SECONDARY_PHASE}

          Progress Snapshot
          - Completed:
          ${COMPLETED_ITEMS}
          - In Progress:
          ${IN_PROGRESS_ITEMS}
          - Pending:
          ${PENDING_ITEMS}

          Key Risks or Blockers
          ${RISK_ITEMS}

          Evidence
          ${EVIDENCE_ITEMS}

          Next Actions
          ${NEXT_ACTIONS}

          EOF
          fi

          cat >> tracker/project-tracker-report.md <<EOF

          ---

          ## Prompt Instructions Used

          ${PROMPT}
          EOF

          echo "report_path=tracker/project-tracker-report.md" >> "$GITHUB_OUTPUT"

      - name: Publish report to workflow summary
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        shell: bash
        run: |
          cat "${{ steps.analysis.outputs.report_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: basic-project-tracker-${{ github.run_number }}
          path: ${{ steps.analysis.outputs.report_path }}
