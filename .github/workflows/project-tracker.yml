name: Basic Project Tracker

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to analyze (for example, main)
        required: true
        default: main
      allowed_branches:
        description: Comma-separated allowed branches (for example, main,develop,release/*)
        required: false
        default: main
      notification_email:
        description: Email to send report to (optional, overrides GitHub profile email)
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 5'

permissions:
  contents: read

concurrency:
  group: basic-project-tracker-${{ github.ref_name || inputs.target_branch || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve branch configuration
        id: branch_cfg
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET_BRANCH="${{ inputs.target_branch }}"
            ALLOWED_RAW="${{ inputs.allowed_branches }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
            ALLOWED_RAW="${{ vars.PROJECT_TRACKER_ALLOWED_BRANCHES }}"
          fi

          if [ -z "${ALLOWED_RAW}" ]; then
            ALLOWED_RAW="main"
          fi

          SHOULD_RUN="false"
          IFS=',' read -ra BRANCH_PATTERNS <<< "$ALLOWED_RAW"
          for pattern in "${BRANCH_PATTERNS[@]}"; do
            trimmed="$(echo "$pattern" | xargs)"
            if [ -n "$trimmed" ] && [[ "$TARGET_BRANCH" == $trimmed ]]; then
              SHOULD_RUN="true"
              break
            fi
          done

          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "allowed_branches=$ALLOWED_RAW" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Skip when branch is not allowed
        if: ${{ steps.branch_cfg.outputs.should_run != 'true' }}
        shell: bash
        run: |
          echo "### Basic Project Tracker" >> "$GITHUB_STEP_SUMMARY"
          echo "Run skipped because branch is not allowed." >> "$GITHUB_STEP_SUMMARY"
          echo "Current branch: ${{ steps.branch_cfg.outputs.target_branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Allowed branches: ${{ steps.branch_cfg.outputs.allowed_branches }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout selected branch
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.branch_cfg.outputs.target_branch }}

      - name: Load prompt
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        id: prompt
        shell: bash
        run: |
          set -euo pipefail
          PROMPT_FILE=".github/prompts/basic-project-tracker.prompt.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "Prompt file not found at $PROMPT_FILE. Using empty prompt."
            echo "PROMPT=" >> "$GITHUB_ENV"
          else
            {
              echo "PROMPT<<EOF"
              cat "$PROMPT_FILE"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Analyze codebase
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        id: analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${{ steps.branch_cfg.outputs.target_branch }}"
          NOW_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

          FILE_COUNT="$(git ls-files | wc -l | tr -d ' ')"
          DIR_COUNT="$(find . -type d -not -path '*/.git/*' | wc -l | tr -d ' ')"
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          COMMIT_LAST_30="$(git rev-list --count --since='30 days ago' HEAD)"
          LOC_ADDED="$(git log --since='30 days ago' --pretty=tformat: --numstat | awk '{ add += $1 } END { print add + 0 }')"
          LOC_DELETED="$(git log --since='30 days ago' --pretty=tformat: --numstat | awk '{ del += $2 } END { print del + 0 }')"

          TOP_EXTENSIONS="$(git ls-files | awk -F. 'NF>1{print tolower($NF)}' | sort | uniq -c | sort -nr | head -8)"
          TOP_ACTIVE_FILES="$(git log --since='30 days ago' --name-only --pretty=format: | sed '/^$/d' | sort | uniq -c | sort -nr | head -8)"

          PROJECT_NAME="${GITHUB_REPOSITORY#*/}"
          PROJECT_BRIEF="Repository-level project with active source and delivery artifacts."
          if [ -f "README.md" ]; then
            README_LINE="$(grep -m1 -E '^[[:space:]]*[^#[:space:]].+' README.md || true)"
            if [ -n "$README_LINE" ]; then
              PROJECT_BRIEF="$README_LINE"
            fi
          fi

          PRIMARY_PHASE="Development"
          PHASE_CONFIDENCE="72"
          SECONDARY_PHASE="Testing"

          if [ -f "deploy_report.json" ] || [ -f "deploy_report.txt" ]; then
            PRIMARY_PHASE="Deployment"
            PHASE_CONFIDENCE="82"
            SECONDARY_PHASE="Testing"
          elif [ -d "outputs/testing" ] || [ -d "tests" ] || [ -f "jest.config.js" ]; then
            PRIMARY_PHASE="Testing"
            PHASE_CONFIDENCE="78"
            SECONDARY_PHASE="Development"
          elif [ -d "outputs/architecture" ]; then
            PRIMARY_PHASE="Architecture"
            PHASE_CONFIDENCE="76"
            SECONDARY_PHASE="Development"
          elif [ -d "outputs/design" ]; then
            PRIMARY_PHASE="Design"
            PHASE_CONFIDENCE="74"
            SECONDARY_PHASE="Architecture"
          elif [ -d "outputs/requirements" ]; then
            PRIMARY_PHASE="Requirements"
            PHASE_CONFIDENCE="75"
            SECONDARY_PHASE="Design"
          fi

          CODEBASE_EVIDENCE="Repository: ${GITHUB_REPOSITORY}\nBranch: ${BRANCH}\nTracked files: ${FILE_COUNT}\nDirectories: ${DIR_COUNT}\nTotal commits: ${COMMIT_COUNT}\nCommits (30d): ${COMMIT_LAST_30}\nLOC added (30d): ${LOC_ADDED}\nLOC deleted (30d): ${LOC_DELETED}\n\nTop file types:\n${TOP_EXTENSIONS}\n\nMost active files (30d):\n${TOP_ACTIVE_FILES}"

          AI_REPORT=""
          if [ -n "${OPENAI_API_KEY:-}" ] && [ -n "${PROMPT:-}" ]; then
            AI_INPUT="Prompt:\n${PROMPT}\n\nCodebase Evidence:\n${CODEBASE_EVIDENCE}"
            RESPONSE="$(curl --max-time 45 -sS https://api.openai.com/v1/responses -H "Content-Type: application/json" -H "Authorization: Bearer ${OPENAI_API_KEY}" -d "$(jq -n --arg input "$AI_INPUT" '{model:"gpt-4.1-mini", input:$input}')" || true)"
            AI_REPORT="$(echo "$RESPONSE" | jq -r '.output_text // .output[0].content[0].text // empty' 2>/dev/null || true)"
          fi

          mkdir -p tracker

          {
            echo "# Basic Project Tracker Report"
            echo
            echo "- Generated: ${NOW_UTC}"
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Branch: ${BRANCH}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Data source: Whole codebase"
            echo
          } > tracker/project-tracker-report.md

          if [ -n "$AI_REPORT" ]; then
            echo "$AI_REPORT" >> tracker/project-tracker-report.md
            echo >> tracker/project-tracker-report.md
          else
            {
              echo "Project Summary"
              echo "- ${PROJECT_NAME} is the current project."
              echo "- ${PROJECT_BRIEF}"
              echo "- This report is generated from whole-codebase evidence."
              echo "- Recent engineering activity indicates ${COMMIT_LAST_30} commits in the last 30 days."
              echo
              echo "Project Brief"
              echo "- Repository focus: ${PROJECT_NAME}"
              echo "- Scope summary: ${PROJECT_BRIEF}"
              echo
              echo "Current Phase"
              echo "- Primary phase: ${PRIMARY_PHASE}"
              echo "- Confidence: ${PHASE_CONFIDENCE}%"
              echo "- Secondary phase (if needed): ${SECONDARY_PHASE}"
              echo
              echo "Progress Snapshot"
              echo "- Completed:"
              echo "  - Branch workflow and tracker automation are configured."
              echo "  - Repository evidence is being scanned successfully."
              echo "- In Progress:"
              echo "  - Codebase changes continue across active files."
              echo "  - Ongoing implementation and validation are inferred from commit activity."
              echo "- Pending:"
              echo "  - Final phase closure depends on downstream validation and release checkpoints."
              echo "  - Documentation alignment and risk sign-off remain open."
              echo
              echo "Key Risks or Blockers"
              echo "- Medium: Activity concentrated in a small set of files can raise merge/regression risk."
              echo "- Medium: Missing structured status metadata may reduce confidence in milestone-level reporting."
              echo
              echo "Evidence"
              echo "- File: .github/workflows/project-tracker.yml | Why: Defines branch-scoped analysis and report generation."
              echo "- File: .github/prompts/basic-project-tracker.prompt.md | Why: Defines the expected tracker output shape."
              echo "- File: README.md | Why: Provides project context when available."
              echo "- File: git history | Why: Provides trend and activity signals for current status."
              echo
              echo "Codebase Snapshot"
              echo "- Total tracked files: ${FILE_COUNT}"
              echo "- Total directories: ${DIR_COUNT}"
              echo "- Total commits: ${COMMIT_COUNT}"
              echo "- LOC added (last 30 days): ${LOC_ADDED}"
              echo "- LOC deleted (last 30 days): ${LOC_DELETED}"
              echo
              echo "Next Actions"
              echo "1. Review the most active files and confirm intended scope."
              echo "2. Validate current phase deliverables against acceptance expectations."
              echo "3. Update key docs and rerun tracker for the next checkpoint."
              echo
            } >> tracker/project-tracker-report.md
          fi

          {
            echo "---"
            echo
            echo "## Prompt Instructions Used"
            echo
            echo "$PROMPT"
          } >> tracker/project-tracker-report.md

          echo "report_path=tracker/project-tracker-report.md" >> "$GITHUB_OUTPUT"

      - name: Publish report to workflow summary
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        shell: bash
        run: |
          cat "${{ steps.analysis.outputs.report_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: basic-project-tracker-${{ github.run_number }}
          path: ${{ steps.analysis.outputs.report_path }}

      - name: Resolve notification email
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' }}
        id: get_email
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          OVERRIDE_EMAIL="${{ inputs.notification_email || '' }}"
          if [ -n "$OVERRIDE_EMAIL" ]; then
            echo "email=$OVERRIDE_EMAIL" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            PUSH_EMAIL="${{ github.event.pusher.email }}"
            echo "email=${PUSH_EMAIL}" >> "$GITHUB_OUTPUT"
          else
            PROFILE_EMAIL="$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/users/${{ github.actor }}" | jq -r '.email // empty')"
            echo "email=${PROFILE_EMAIL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send report email
        if: ${{ steps.branch_cfg.outputs.should_run == 'true' && steps.get_email.outputs.email != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Project Tracker Report - ${{ github.ref_name }} (#${{ github.run_number }})"
          to: ${{ steps.get_email.outputs.email }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hi ${{ github.actor }},

            Your Basic Project Tracker report has been generated for branch: ${{ steps.branch_cfg.outputs.target_branch }}
            Triggered by: ${{ github.event_name }}

            View the full report and artifact at:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This is an automated message from GitHub Actions.
